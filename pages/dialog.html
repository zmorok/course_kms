<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Диалог</title>
  <link rel="stylesheet" href="../assets/css/index.css" />
  <link rel="stylesheet" href="../assets/css/dialog.css" />
  <script src="../assets/js/knowledge.js?v=3" defer></script>
  <script src="../assets/js/endings.js?v=3" defer></script>
  <script src="../assets/js/answer-engine.js?v=3" defer></script>
  <script src="../assets/js/dialog.js?v=3" defer></script>
</head>

<body>
  <header>
    <a href="../index.html">Титул</a>
    <a href="./theory.html">Теория</a>
    <a href="./description.html">Описание</a>
    <a href="./work-algorithm.html">Принцип работы</a>
    <a href="./simulator.html">Симулятор</a>
    <a href="./dialog.html">Диалог</a>
  </header>

  <main>
    <h1>Диалоговая база знаний</h1>
    <div class="dialog-panel">
      <h2>Вопрос к базе знаний</h2>

      <form class="dialog-form" id="question-form">
        <label class="dialog-label" for="question-input">Введите вопрос</label>
        <textarea id="question-input" rows="4" placeholder="Например: Что выполняет резак?"></textarea>

        <div class="dialog-actions">
          <button type="submit">Получить ответ</button>
          <button type="button" id="clear-dialog">Очистить</button>
        </div>
      </form>

      <div class="dialog-question-list">
        <label class="dialog-label" for="simple-question-select">Простые вопросы</label>
        <select id="simple-question-select">
          <option value="">Выберите простой вопрос</option>
        </select>
      </div>

      <div class="dialog-question-list">
        <label class="dialog-label" for="interesting-question-select">Интересные вопросы</label>
        <select id="interesting-question-select">
          <option value="">Выберите вопрос с изображением</option>
        </select>
      </div>

      <section class="answer-box" id="answer-box" aria-live="polite">
        <h3>Ответ</h3>
        <div id="answer-output">Ответ появится здесь.</div>
      </section>

      <section class="history-box">
        <h3>История вопросов</h3>
        <ol id="question-history"></ol>
      </section>
    </div>
  </main>
</body>

</html>
